<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="./css/index.css" />
    <title>Login - CineGo</title>
  </head>

  <body>
    <div class="login-box">
      <h4 class="login-title">
        Cine<span style="color: #e50914">Go</span> Login
      </h4>

      <form id="loginForm">
        <div class="mb-3">
          <input
            id="user"
            type="text"
            class="form-control"
            placeholder="Tên đăng nhập..."
          />
        </div>

        <div class="mb-3">
          <input
            id="pass"
            type="password"
            class="form-control"
            placeholder="Mật khẩu..."
          />
        </div>

        <div class="extra">
          <label><input type="checkbox" /> Lưu mật khẩu</label>
          <a href="#">Quên mật khẩu?</a>
        </div>

        <button type="button" onclick="dangNhap()" class="btn btn-login mt-3">
          Đăng nhập
        </button>

        <div class="divider">hoặc</div>

        <div class="d-flex justify-content-between social-btns">
          <button class="btn btn-primary btn-sm">Facebook</button>
          <button class="btn btn-info btn-sm">Twitter</button>
        </div>

        <p class="text-center mt-3">
          Chưa có tài khoản? <a href="#" style="color: #e50914">Đăng ký ngay</a>
        </p>
      </form>
    </div>
    <script>
      function dangNhap() {
        const cUser = "admin";
        const cPass = "123456";
        const user = document.getElementById("user").value;
        const pass = document.getElementById("pass").value;

        if (user === cUser && pass === cPass) {
          window.location.href = "./pages/home.html";
        }
      }
    </script>
  </body>
</html>
